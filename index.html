<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>Quote of the Day — ISM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&family=Newsreader:ital,wght@0,400;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink-deep:#fcd34d;
    --ink-base:#fffbeb;
    --ink-light:#f59e0b;
    --vellum:#1c0a00;
    --vellum-dim:#78350f;
    --brass:#92400e;
    --brass-bright:#d97706;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  html{ background:var(--ink-deep); }
  body{
    font-family:'Manrope', system-ui, sans-serif;
    color:var(--vellum);
  }

  .banner{
    position:relative;
    width:100%;
    overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    background: linear-gradient(125deg, var(--ink-base), var(--ink-deep) 75%);
  }
  @media (min-width:720px){ .banner{ aspect-ratio:1920/300; } }
  @media (max-width:719px){ .banner{ min-height:260px; padding:32px 16px; } }

  .banner::before,
  .banner::after{ content:''; position:absolute; pointer-events:none; }
  .banner::before{
    width:130%; height:55%; left:-12%; top:-22%;
    background:linear-gradient(100deg, var(--ink-light), transparent 65%);
    opacity:.18; transform:rotate(-6deg);
  }
  .banner::after{
    width:120%; height:50%; right:-10%; bottom:-26%;
    background:linear-gradient(280deg, var(--brass), transparent 70%);
    opacity:.10; transform:rotate(5deg);
  }

  .sparkle-field{ position:absolute; inset:0; pointer-events:none; z-index:0; }
  .amb{
    position:absolute; width:4px; height:4px; border-radius:50%;
    background:var(--brass-bright);
    box-shadow:0 0 6px 1px rgba(146,64,14,.5);
    opacity:.18;
    animation: amb-twinkle 3.4s ease-in-out infinite;
  }
  @keyframes amb-twinkle{
    0%,100%{ opacity:.12; transform:scale(.75); }
    50%{ opacity:.6; transform:scale(1.05); }
  }

  .stage{
    position:relative; z-index:1;
    width:100%; max-width:680px; padding:0 24px;
    display:flex; align-items:center; justify-content:center; text-align:center;
  }

  /* ---------- shared panel mechanics ---------- */
  .panel{ opacity:0; transform:translateY(16px); }
  .panel[hidden]{ display:none; }
  .panel.is-shown{ animation:panel-in 480ms cubic-bezier(.16,.84,.44,1) forwards; }
  @keyframes panel-in{ to{ opacity:1; transform:translateY(0); } }
  @media (prefers-reduced-motion:reduce){
    .panel{ opacity:1 !important; transform:none !important; animation:none !important; }
  }

  .panel-eyebrow{
    font-size:clamp(10.5px,1.1vw,12px); letter-spacing:.16em; text-transform:uppercase;
    color:var(--brass); font-weight:700;
  }

  /* ---------- welcome ---------- */
  .welcome-panel{
    background:none; border:none; cursor:pointer; color:inherit; font-family:inherit;
    display:flex; flex-direction:column; align-items:center; gap:8px; padding:10px;
  }
  .welcome-panel:hover .greeting{ color:var(--brass-bright); }
  .welcome-panel:focus-visible{ outline:2px solid var(--brass-bright); outline-offset:8px; border-radius:16px; }
  .welcome-panel:active{ transform:scale(.985); }

  .time-icon{ display:inline-flex; }
  .time-icon .icon-sun,
  .time-icon .icon-moon{ display:none; }
  .time-icon.is-day .icon-sun{ display:block; }
  .time-icon.is-night .icon-moon{ display:block; }

  .greeting{
    font-family:'Newsreader', serif; font-style:italic; font-weight:450;
    font-size:clamp(24px,3vw,36px); color:var(--vellum); transition:color 200ms ease;
  }
  .welcome-hint{
    font-size:clamp(11.5px,1.1vw,13px); color:var(--vellum-dim); letter-spacing:.04em;
    animation:hint-pulse 2.2s ease-in-out infinite;
  }
  @keyframes hint-pulse{ 0%,100%{ opacity:.5; } 50%{ opacity:1; } }
  @media (prefers-reduced-motion:reduce){ .welcome-hint{ animation:none; opacity:.8; } }

  /* ---------- choice + mood ---------- */
  .choice-panel, .mood-panel{ display:flex; flex-direction:column; align-items:center; gap:14px; }

  .choice-row{ display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
  .choice-card{
    display:flex; flex-direction:column; align-items:center; gap:6px;
    padding:14px 22px; border-radius:14px; border:1px solid var(--ink-light);
    background:rgba(0,0,0,.04); color:var(--vellum-dim); cursor:pointer;
    font-family:inherit; min-width:190px;
    transition:border-color 180ms ease, transform 140ms ease, background 180ms ease, color 180ms ease;
  }
  .choice-card:hover{ border-color:var(--brass); color:var(--vellum); background:rgba(146,64,14,.08); transform:translateY(-2px); }
  .choice-card:focus-visible{ outline:2px solid var(--brass-bright); outline-offset:3px; }
  .choice-card:active{ transform:scale(.97); }
  .choice-card .emoji{ font-size:22px; }
  .choice-card .label{ font-size:clamp(13px,1.4vw,15px); font-weight:600; }

  .mood-row{ display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .mood-chip{
    display:flex; flex-direction:column; align-items:center; gap:4px;
    padding:10px 18px; border-radius:12px; border:1px solid var(--ink-light);
    background:rgba(0,0,0,.04); color:var(--vellum-dim); cursor:pointer;
    font-family:inherit; min-width:84px;
    transition:border-color 180ms ease, transform 140ms ease, color 180ms ease;
  }
  .mood-chip:hover{ border-color:var(--brass); color:var(--vellum); transform:translateY(-2px); }
  .mood-chip:focus-visible{ outline:2px solid var(--brass-bright); outline-offset:3px; }
  .mood-chip:active{ transform:scale(.96); }
  .mood-chip .emoji{ font-size:20px; }
  .mood-chip .label{ font-size:clamp(11.5px,1.2vw,13px); font-weight:600; }

  .ghost-pill{
    background:transparent; border:1px solid var(--ink-light);
    color:var(--vellum-dim); font-family:inherit; font-size:clamp(11.5px,1.1vw,13px);
    font-weight:600; padding:7px 14px; border-radius:999px; cursor:pointer;
    transition:border-color 180ms ease, color 180ms ease, transform 140ms ease;
  }
  .ghost-pill:hover{ border-color:var(--brass); color:var(--brass-bright); }
  .ghost-pill:active{ transform:scale(.96); }
  .ghost-pill:focus-visible{ outline:2px solid var(--brass-bright); outline-offset:3px; }

  /* ---------- cookie trigger ---------- */
  .cookie-trigger{
    background:none; border:none; cursor:pointer; color:inherit; font-family:inherit;
    display:flex; flex-direction:column; align-items:center; gap:14px; padding:8px;
  }
  .cookie-trigger:hover .cookie-label{ color:var(--brass-bright); }
  .cookie-trigger:hover .cookie-stage{ transform:rotate(45deg) scale(1.08); }
  .cookie-trigger:focus-visible{ outline:2px solid var(--brass-bright); outline-offset:8px; border-radius:16px; }

  .cookie-stage{
    position:relative;
    width:clamp(52px,6vw,68px); height:clamp(22px,2.6vw,30px);
    transform:rotate(45deg);
    transition:transform 220ms ease;
    margin-bottom:clamp(16px,2vw,22px);
  }
  .cookie-stage:not(.is-cracked) .cookie-wrap{ animation:cookie-idle 2.6s ease-in-out infinite; }
  @keyframes cookie-idle{
    0%,100%{ transform:translateY(0) rotate(0deg); }
    50%{ transform:translateY(-5px) rotate(4deg); }
  }
  .cookie-wrap{
    position:absolute; inset:0;
    display:flex;
    filter:drop-shadow(0 5px 12px rgba(100,30,10,.32));
  }
  .pill-cap{
    position:relative; width:50%; height:100%;
    background:linear-gradient(160deg, #f07272 0%, #c0392b 100%);
    border-radius:999px 0 0 999px;
    transition:transform 650ms cubic-bezier(.2,.8,.3,1), opacity 500ms ease 100ms;
  }
  .pill-cap::after{
    content:''; position:absolute;
    width:32%; height:52%; top:10%; left:14%;
    background:rgba(255,255,255,.25); border-radius:50%;
  }
  .pill-body{
    position:relative; width:50%; height:100%;
    background:linear-gradient(160deg, #ffffff 0%, #dedad3 100%);
    border-radius:0 999px 999px 0;
    border-left:1.5px solid rgba(0,0,0,.07);
    transition:transform 650ms cubic-bezier(.2,.8,.3,1), opacity 500ms ease 100ms;
  }
  .pill-body::after{
    content:''; position:absolute;
    width:32%; height:52%; top:10%; right:14%;
    background:rgba(255,255,255,.55); border-radius:50%;
  }
  .is-cracked .pill-cap{ transform:translate(-52%,-24%) rotate(-30deg); opacity:0; }
  .is-cracked .pill-body{ transform:translate(52%,-24%) rotate(30deg); opacity:0; }

  .spark{
    position:absolute; left:50%; top:50%; width:5px; height:5px; margin:-2.5px;
    border-radius:50%; background:var(--brass-bright); opacity:0;
  }
  @keyframes spark-burst{
    0%{ transform:translate(0,0) scale(.4); opacity:1; }
    65%{ opacity:1; }
    100%{ transform:translate(var(--tx),var(--ty)) scale(1); opacity:0; }
  }
  .burst{ position:absolute; inset:0; pointer-events:none; }
  .is-cracked .burst .spark{ animation:spark-burst 680ms ease-out forwards; }
  .burst .spark:nth-child(1){ --tx:-40px; --ty:-30px; }
  .burst .spark:nth-child(2){ --tx:2px;  --ty:-46px; animation-delay:20ms; }
  .burst .spark:nth-child(3){ --tx:42px; --ty:-28px; animation-delay:40ms; }
  .burst .spark:nth-child(4){ --tx:52px; --ty:8px;   animation-delay:10ms; }
  .burst .spark:nth-child(5){ --tx:32px; --ty:38px;  animation-delay:55ms; }
  .burst .spark:nth-child(6){ --tx:-30px;--ty:38px;  animation-delay:25ms; }
  .burst .spark:nth-child(7){ --tx:-52px;--ty:8px;   animation-delay:45ms; }
  .burst .spark:nth-child(8){ --tx:-2px; --ty:44px;  animation-delay:15ms; }

  .cookie-label{
    font-size:clamp(13px,1.6vw,16px); font-weight:600; letter-spacing:.01em;
    color:var(--vellum-dim); transition:color 200ms ease;
  }

  @media (prefers-reduced-motion:reduce){
    .cookie-stage:not(.is-cracked) .cookie-wrap,
    .amb, .pill-cap, .pill-body, .spark{ animation:none !important; transition:none !important; }
  }

  /* ---------- reveal ---------- */
  .reveal{
    position:relative;
    display:flex; flex-direction:row; align-items:center; gap:10px;
  }
  .reveal::before{
    content:''; position:absolute; top:50%; left:50%;
    width:380px; height:170px; transform:translate(-50%,-50%);
    background:radial-gradient(circle, rgba(146,64,14,.12), transparent 70%);
    filter:blur(14px); z-index:-1; pointer-events:none;
    animation:glow-breathe 5s ease-in-out infinite;
  }
  @keyframes glow-breathe{ 0%,100%{ opacity:.55; } 50%{ opacity:1; } }
  @media (prefers-reduced-motion:reduce){ .reveal::before{ animation:none; } }

  .reveal-burst{ position:absolute; inset:0; pointer-events:none; }
  .reveal-burst .spark{ top:50%; }
  .reveal.is-shown .reveal-burst .spark{ animation:spark-burst 760ms ease-out forwards; }
  .reveal-burst .spark:nth-child(1){ --tx:-130px; --ty:-22px; animation-delay:80ms; }
  .reveal-burst .spark:nth-child(2){ --tx:-65px;  --ty:-42px; animation-delay:140ms; }
  .reveal-burst .spark:nth-child(3){ --tx:0px;    --ty:-50px; animation-delay:20ms; }
  .reveal-burst .spark:nth-child(4){ --tx:65px;   --ty:-42px; animation-delay:160ms; }
  .reveal-burst .spark:nth-child(5){ --tx:130px;  --ty:-22px; animation-delay:100ms; }

  .reveal-photo-col{
    flex-shrink:0;
    width:clamp(60px,4.5vw,72px);
    display:flex; align-items:flex-start; justify-content:center;
    align-self:flex-start; padding-top:4px;
  }
  .reveal-text-col{
    display:flex; flex-direction:column; align-items:center; gap:5px;
    text-align:center; max-width:clamp(300px,50vw,520px);
  }

  .reveal-quote{
    margin:0; font-family:'Newsreader', serif; font-style:italic; font-weight:450;
    line-height:1.4; color:var(--vellum); width:100%;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
  }
  .reveal-quote.q-lg{ font-size:clamp(17px,2.1vw,25px); display:block; white-space:nowrap; text-overflow:ellipsis; -webkit-line-clamp:unset; }
  .reveal-quote.q-md{ font-size:clamp(15.5px,1.7vw,21px); }
  .reveal-quote.q-sm{ font-size:clamp(14px,1.4vw,17.5px); }

  .reveal-author{
    margin:0; font-size:clamp(11.5px,1.2vw,13px); letter-spacing:.05em;
    text-transform:uppercase; color:var(--brass);
  }
  .author-text{
    display:flex; flex-direction:column; align-items:center; gap:3px;
  }
  .author-role{
    font-size:clamp(10px,.9vw,11.5px); color:var(--vellum-dim); letter-spacing:.02em;
    opacity:0; transition:opacity 400ms ease 100ms;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:360px;
  }
  .author-role.is-loaded{ opacity:1; }

  .author-photo{
    width:clamp(60px,4.5vw,72px); height:clamp(60px,4.5vw,72px);
    border-radius:50%; object-fit:cover; object-position:center top;
    border:2px solid var(--brass);
    box-shadow:0 0 14px rgba(212,169,83,.45);
    opacity:0; transition:opacity 500ms ease; flex-shrink:0;
  }
  .author-photo.is-loaded{ opacity:1; }

  .reveal-again{ margin-top:4px; }
  .pill-icon{
    display:inline-block;
    transform:rotate(-45deg);
    font-size:.72em;
    vertical-align:middle;
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="sparkle-field" aria-hidden="true">
      <span class="amb" style="left:8%;top:24%;animation-delay:0s;"></span>
      <span class="amb" style="left:15%;top:68%;animation-delay:.6s;"></span>
      <span class="amb" style="left:28%;top:16%;animation-delay:1.4s;"></span>
      <span class="amb" style="left:72%;top:20%;animation-delay:.3s;"></span>
      <span class="amb" style="left:85%;top:64%;animation-delay:1s;"></span>
      <span class="amb" style="left:93%;top:30%;animation-delay:1.8s;"></span>
      <span class="amb" style="left:62%;top:78%;animation-delay:2.2s;"></span>
    </div>

    <div class="stage" id="stage">

      <button class="panel welcome-panel" id="welcomePanel" type="button">
        <span class="time-icon" id="timeIcon" aria-hidden="true">
          <svg class="icon-sun" viewBox="0 0 32 32" width="26" height="26">
            <circle cx="16" cy="16" r="7" fill="var(--brass-bright)"/>
            <g stroke="var(--brass-bright)" stroke-width="2" stroke-linecap="round">
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="16" y1="26" x2="16" y2="30"/>
              <line x1="2" y1="16" x2="6" y2="16"/>
              <line x1="26" y1="16" x2="30" y2="16"/>
              <line x1="6.3" y1="6.3" x2="9.1" y2="9.1"/>
              <line x1="22.9" y1="22.9" x2="25.7" y2="25.7"/>
              <line x1="6.3" y1="25.7" x2="9.1" y2="22.9"/>
              <line x1="22.9" y1="9.1" x2="25.7" y2="6.3"/>
            </g>
          </svg>
          <svg class="icon-moon" viewBox="0 0 32 32" width="24" height="24">
            <mask id="moonMask">
              <rect width="32" height="32" fill="white"/>
              <circle cx="21" cy="12" r="9" fill="black"/>
            </mask>
            <circle cx="16" cy="16" r="10" fill="var(--brass-bright)" mask="url(#moonMask)"/>
          </svg>
        </span>
        <span class="greeting" id="greetingText"></span>
        <span class="welcome-hint">Tap anywhere to begin</span>
      </button>

      <div class="panel choice-panel" id="choicePanel" hidden>
        <span class="panel-eyebrow">✦ Pick your path</span>
        <div class="choice-row">
          <button class="choice-card" id="feelingBtn" type="button">
            <span class="emoji" aria-hidden="true">🤔</span>
            <span class="label">How are you feeling today?</span>
          </button>
          <button class="choice-card" id="inspireBtn" type="button">
            <span class="emoji" aria-hidden="true">✨</span>
            <span class="label">I need something inspirational</span>
          </button>
        </div>
      </div>

      <div class="panel mood-panel" id="moodPanel" hidden>
        <span class="panel-eyebrow">✦ How are you feeling today?</span>
        <div class="mood-row">
          <button class="mood-chip" type="button" data-mood="stressed">
            <span class="emoji" aria-hidden="true">😣</span><span class="label">Stressed</span>
          </button>
          <button class="mood-chip" type="button" data-mood="low">
            <span class="emoji" aria-hidden="true">😔</span><span class="label">Low</span>
          </button>
          <button class="mood-chip" type="button" data-mood="stuck">
            <span class="emoji" aria-hidden="true">😕</span><span class="label">Stuck</span>
          </button>
          <button class="mood-chip" type="button" data-mood="good">
            <span class="emoji" aria-hidden="true">😊</span><span class="label">Good</span>
          </button>
        </div>
        <button class="ghost-pill" id="moodBackBtn" type="button">← Back</button>
      </div>

      <button class="panel cookie-trigger" id="cookieBtn" type="button" hidden>
        <span class="cookie-stage" id="cookieStage">
          <span class="cookie-wrap">
            <span class="pill-cap"></span>
            <span class="pill-body"></span>
          </span>
          <span class="burst" aria-hidden="true">
            <span class="spark"></span><span class="spark"></span><span class="spark"></span><span class="spark"></span>
            <span class="spark"></span><span class="spark"></span><span class="spark"></span><span class="spark"></span>
          </span>
        </span>
        <span class="cookie-label"><span class="pill-icon">💊</span> Take your positive pill</span>
      </button>

      <div class="panel reveal" id="reveal" aria-live="polite" hidden>
        <span class="reveal-burst" aria-hidden="true">
          <span class="spark"></span><span class="spark"></span><span class="spark"></span><span class="spark"></span><span class="spark"></span>
        </span>
        <div class="reveal-photo-col">
          <img class="author-photo" id="authorPhoto" alt="" hidden>
        </div>
        <div class="reveal-text-col">
          <span class="panel-eyebrow" id="revealEyebrow">✦ Today's fortune</span>
          <p class="reveal-quote" id="quoteText"></p>
          <div class="author-text">
            <p class="reveal-author" id="quoteAuthor"></p>
            <span class="author-role" id="authorRole"></span>
          </div>
          <button class="ghost-pill reveal-again" id="againBtn" type="button"><span class="pill-icon">💊</span> One more dose</button>
        </div>
      </div>

    </div>
  </div>

<script>
(function () {
  var generalQuotes = [
    { q: "The only way to do great work is to love what you do.", a: "Steve Jobs" },
    { q: "Believe you can and you're halfway there.", a: "Theodore Roosevelt" },
    { q: "It does not matter how slowly you go as long as you do not stop.", a: "Confucius" },
    { q: "Success is not final, failure is not fatal: it is the courage to continue that counts.", a: "Winston Churchill" },
    { q: "The future belongs to those who believe in the beauty of their dreams.", a: "Eleanor Roosevelt" },
    { q: "What lies behind us and what lies before us are tiny matters compared to what lies within us.", a: "Ralph Waldo Emerson" },
    { q: "The way to get started is to quit talking and begin doing.", a: "Walt Disney" },
    { q: "Whether you think you can, or you think you can't — you're right.", a: "Henry Ford" },
    { q: "It always seems impossible until it's done.", a: "Nelson Mandela" },
    { q: "You miss 100% of the shots you don't take.", a: "Wayne Gretzky" },
    { q: "Whatever you are, be a good one.", a: "Abraham Lincoln" },
    { q: "The mind is everything. What you think, you become.", a: "Gautama Buddha" },
    { q: "Life is what happens to you while you're busy making other plans.", a: "John Lennon" },
    { q: "Tell me and I forget, teach me and I may remember, involve me and I learn.", a: "Benjamin Franklin" },
    { q: "In the middle of difficulty lies opportunity.", a: "Albert Einstein" },
    { q: "Do not go where the path may lead; go instead where there is no path and leave a trail.", a: "Ralph Waldo Emerson" },
    { q: "Keep your face always toward the sunshine, and shadows will fall behind you.", a: "Walt Whitman" },
    { q: "Twenty years from now you will be more disappointed by the things you didn't do than by the ones you did.", a: "Mark Twain" },
    { q: "I am not afraid of storms, for I am learning how to sail my ship.", a: "Louisa May Alcott" },
    { q: "Spread love everywhere you go. Let no one ever come to you without leaving happier.", a: "Mother Teresa" },
    { q: "When you reach the end of your rope, tie a knot in it and hang on.", a: "Franklin D. Roosevelt" },
    { q: "Don't judge each day by the harvest you reap but by the seeds that you plant.", a: "Robert Louis Stevenson" },
    { q: "If you don't like something, change it. If you can't change it, change your attitude.", a: "Maya Angelou" },
    { q: "Nothing is impossible; the word itself says 'I'm possible.'", a: "Audrey Hepburn" },
    { q: "Although the world is full of suffering, it is also full of the overcoming of it.", a: "Helen Keller" },
    { q: "You are never too old to set another goal or to dream a new dream.", a: "C.S. Lewis" },
    { q: "The biggest adventure you can take is to live the life of your dreams.", a: "Oprah Winfrey" },
    { q: "It is our choices that show what we truly are, far more than our abilities.", a: "J.K. Rowling" },
    { q: "A journey of a thousand miles begins with a single step.", a: "Lao Tzu" },
    { q: "It's not whether you get knocked down; it's whether you get up.", a: "Vince Lombardi" },
    { q: "I've failed over and over and over again in my life, and that is why I succeed.", a: "Michael Jordan" },
    { q: "Do what you can, with what you have, where you are.", a: "Theodore Roosevelt" },
    { q: "Success is to be measured not so much by the position one has reached, as by the obstacles overcome.", a: "Booker T. Washington" },
    { q: "Nothing in life is to be feared, it is only to be understood.", a: "Marie Curie" },
    { q: "The most difficult thing is the decision to act; the rest is merely tenacity.", a: "Amelia Earhart" },
    { q: "I have learned over the years that when one's mind is made up, this diminishes fear.", a: "Rosa Parks" },
    { q: "Go confidently in the direction of your dreams. Live the life you have imagined.", a: "Henry David Thoreau" },
    { q: "Even if you're on the right track, you'll get run over if you just sit there.", a: "Will Rogers" },
    { q: "Our greatest glory is not in never falling, but in rising every time we fall.", a: "Confucius" },
    { q: "You cannot shake hands with a clenched fist.", a: "Indira Gandhi" },
    { q: "Success is not the key to happiness. Happiness is the key to success.", a: "Albert Schweitzer" },
    { q: "Failure is simply the opportunity to begin again, this time more intelligently.", a: "Henry Ford" },
    { q: "Life isn't about finding yourself. Life is about creating yourself.", a: "George Bernard Shaw" },
    { q: "Action is the foundational key to all success.", a: "Pablo Picasso" },
    { q: "Whatever the mind can conceive and believe, it can achieve.", a: "Napoleon Hill" },
    { q: "Happiness is not something readymade. It comes from your own actions.", a: "Dalai Lama" },
    { q: "When the whole world is silent, even one voice becomes powerful.", a: "Malala Yousafzai" },
    { q: "Do your little bit of good where you are; it's those little bits of good put together that overwhelm the world.", a: "Desmond Tutu" },
    { q: "The future depends on what you do today.", a: "Mahatma Gandhi" },
    { q: "Knowing yourself is the beginning of all wisdom.", a: "Aristotle" },
    { q: "Turn your wounds into wisdom.", a: "Oprah Winfrey" },
    { q: "The secret of getting ahead is getting started.", a: "Mark Twain" },
    { q: "Difficulties strengthen the mind, as labor does the body.", a: "Seneca" },
    { q: "He who has a why to live can bear almost any how.", a: "Friedrich Nietzsche" },
    { q: "Energy and persistence conquer all things.", a: "Benjamin Franklin" },
    { q: "The only limit to our realization of tomorrow is our doubts of today.", a: "Franklin D. Roosevelt" },
    { q: "What you get by achieving your goals is not as important as who you become by achieving your goals.", a: "Zig Ziglar" },
    { q: "The pessimist sees difficulty in every opportunity. The optimist sees opportunity in every difficulty.", a: "Winston Churchill" },
    { q: "Either you run the day, or the day runs you.", a: "Jim Rohn" }
  ];

  var moodQuotes = {
    stressed: [
      { q: "You don't have to see the whole staircase, just take the first step.", a: "Martin Luther King Jr." },
      { q: "This too shall pass.", a: "Persian Proverb" },
      { q: "Calm mind brings inner strength and self-confidence.", a: "Dalai Lama" },
      { q: "Nothing can dim the light that shines from within.", a: "Maya Angelou" },
      { q: "Smooth seas do not make skillful sailors.", a: "African Proverb" },
      { q: "Breathe. Let go. This very moment is the only one you know you have for sure.", a: "Oprah Winfrey" },
      { q: "Within you there is a stillness and a sanctuary to which you can retreat at any time.", a: "Hermann Hesse" },
      { q: "It's not the load that breaks you down, it's the way you carry it.", a: "Lou Holtz" },
      { q: "You have power over your mind, not outside events. Realize this, and you will find strength.", a: "Marcus Aurelius" },
      { q: "Almost everything will work again if you unplug it for a few minutes, including you.", a: "Anne Lamott" }
    ],
    low: [
      { q: "Even the darkest night will end and the sun will rise.", a: "Victor Hugo" },
      { q: "Tough times never last, but tough people do.", a: "Robert H. Schuller" },
      { q: "I can be changed by what happens to me, but I refuse to be reduced by it.", a: "Maya Angelou" },
      { q: "When it is dark enough, you can see the stars.", a: "Ralph Waldo Emerson" },
      { q: "Grief and resilience live together.", a: "Michelle Obama" },
      { q: "The sun himself is weak when he first rises, and gathers strength and courage as the day gets on.", a: "Charles Dickens" },
      { q: "Just when the caterpillar thought the world was over, it became a butterfly.", a: "Proverb" },
      { q: "Hope is being able to see that there is light despite all of the darkness.", a: "Desmond Tutu" },
      { q: "The world breaks everyone, and afterward, many are strong at the broken places.", a: "Ernest Hemingway" },
      { q: "Rock bottom became the solid foundation on which I rebuilt my life.", a: "J.K. Rowling" }
    ],
    stuck: [
      { q: "Start where you are. Use what you have. Do what you can.", a: "Arthur Ashe" },
      { q: "Motivation is what gets you started. Habit is what keeps you going.", a: "Jim Rohn" },
      { q: "You can't build a reputation on what you are going to do.", a: "Henry Ford" },
      { q: "Get up, dress up, show up, and never give up.", a: "Regina Brett" },
      { q: "Don't wait for inspiration. It comes while working.", a: "Henri Matisse" },
      { q: "Inspiration exists, but it has to find you working.", a: "Pablo Picasso" },
      { q: "The best time to plant a tree was 20 years ago. The second best time is now.", a: "Chinese Proverb" },
      { q: "Well begun is half done.", a: "Aristotle" },
      { q: "Lost time is never found again.", a: "Benjamin Franklin" },
      { q: "It's not that I'm so smart, it's just that I stay with problems longer.", a: "Albert Einstein" }
    ],
    good: [
      { q: "The more you praise and celebrate your life, the more there is in life to celebrate.", a: "Oprah Winfrey" },
      { q: "Enjoy the little things, for one day you may look back and realize they were the big things.", a: "Robert Brault" },
      { q: "Joy is what happens to us when we allow ourselves to recognize how good things really are.", a: "Marianne Williamson" },
      { q: "Folks are usually about as happy as they make their minds up to be.", a: "Abraham Lincoln" },
      { q: "The grand essentials of happiness are something to do, something to love, and something to hope for.", a: "Allan K. Chalmers" },
      { q: "Celebrate what you've accomplished, but raise the bar a little higher each time you succeed.", a: "Mia Hamm" },
      { q: "Success is best when it's shared.", a: "Howard Schultz" },
      { q: "Carry out a random act of kindness, with no expectation of reward.", a: "Princess Diana" },
      { q: "Use what talents you possess; the woods would be very silent if no birds sang there except those that sang best.", a: "Henry Van Dyke" },
      { q: "When you are content to be simply yourself and don't compare or compete, everybody will respect you.", a: "Lao Tzu" }
    ]
  };

  function hashString(str) {
    var h = 0;
    for (var i = 0; i < str.length; i++) {
      h = (Math.imul(31, h) + str.charCodeAt(i)) | 0;
    }
    return Math.abs(h);
  }

  function todayKey() {
    var d = new Date();
    return d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate();
  }

  function pickRandom(excluding, len) {
    if (len <= 1) return 0;
    var i;
    do { i = Math.floor(Math.random() * len); } while (i === excluding);
    return i;
  }

  function sizeTier(text) {
    var len = text.length;
    if (len <= 55) return 'q-lg';
    if (len <= 95) return 'q-md';
    return 'q-sm';
  }

  var pathMode = null;
  var activePool = null;
  var activeMoodKey = null;
  var currentIndex = null;

  var el = {
    welcomePanel: document.getElementById('welcomePanel'),
    greetingText: document.getElementById('greetingText'),
    timeIcon: document.getElementById('timeIcon'),
    choicePanel: document.getElementById('choicePanel'),
    feelingBtn: document.getElementById('feelingBtn'),
    inspireBtn: document.getElementById('inspireBtn'),
    moodPanel: document.getElementById('moodPanel'),
    moodBackBtn: document.getElementById('moodBackBtn'),
    cookieBtn: document.getElementById('cookieBtn'),
    cookieStage: document.getElementById('cookieStage'),
    reveal: document.getElementById('reveal'),
    revealEyebrow: document.getElementById('revealEyebrow'),
    quoteText: document.getElementById('quoteText'),
    quoteAuthor: document.getElementById('quoteAuthor'),
    authorPhoto: document.getElementById('authorPhoto'),
    authorRole:  document.getElementById('authorRole'),
    againBtn: document.getElementById('againBtn')
  };

  function showPanel(node) {
    node.hidden = false;
    node.classList.remove('is-shown');
    void node.offsetWidth;
    node.classList.add('is-shown');
  }
  function hidePanel(node) {
    node.hidden = true;
    node.classList.remove('is-shown');
  }
  function focusPanel(node) {
    node.setAttribute('tabindex', '-1');
    node.focus({ preventScroll: true });
  }

  // ---- init: always start with the welcome ----
  var hr = new Date().getHours();
  el.greetingText.textContent =
    (hr >= 5 && hr < 12) ? 'Good Morning' :
    (hr >= 12 && hr < 17) ? 'Good Afternoon' : 'Good Evening';
  el.timeIcon.classList.add((hr >= 6 && hr < 18) ? 'is-day' : 'is-night');
  showPanel(el.welcomePanel);

  // ---- welcome -> choice ----
  el.welcomePanel.addEventListener('click', function () {
    hidePanel(el.welcomePanel);
    showPanel(el.choicePanel);
    focusPanel(el.choicePanel);
  });

  // ---- choice -> mood ----
  el.feelingBtn.addEventListener('click', function () {
    hidePanel(el.choicePanel);
    showPanel(el.moodPanel);
    focusPanel(el.moodPanel);
  });

  // ---- choice -> cookie (general pool) ----
  el.inspireBtn.addEventListener('click', function () {
    pathMode = 'today';
    activePool = generalQuotes;
    activeMoodKey = null;
    hidePanel(el.choicePanel);
    showPanel(el.cookieBtn);
    el.cookieBtn.focus({ preventScroll: true });
  });

  // ---- mood -> back to choice ----
  el.moodBackBtn.addEventListener('click', function () {
    hidePanel(el.moodPanel);
    showPanel(el.choicePanel);
    focusPanel(el.choicePanel);
  });

  // ---- mood chip -> cookie ----
  var moodChips = document.querySelectorAll('.mood-chip');
  for (var c = 0; c < moodChips.length; c++) {
    moodChips[c].addEventListener('click', function (evt) {
      var key = evt.currentTarget.getAttribute('data-mood');
      pathMode = 'mood';
      activeMoodKey = key;
      activePool = moodQuotes[key];
      hidePanel(el.moodPanel);
      showPanel(el.cookieBtn);
      el.cookieBtn.focus({ preventScroll: true });
    });
  }

  // ---- fetch author photo + role from Wikipedia (one REST call) ----
  function fetchAuthorInfo(name) {
    el.authorPhoto.classList.remove('is-loaded');
    el.authorPhoto.hidden = true;
    el.authorPhoto.src = '';
    el.authorRole.textContent = '';
    el.authorRole.classList.remove('is-loaded');

    if (/proverb|anonymous|unknown/i.test(name)) return;

    var url = 'https://en.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(name);

    fetch(url)
      .then(function (r) {
        if (!r.ok) throw new Error('not found');
        return r.json();
      })
      .then(function (data) {
        if (data.description) {
          el.authorRole.textContent = data.description;
          el.authorRole.classList.add('is-loaded');
        }
        if (data.thumbnail && data.thumbnail.source) {
          el.authorPhoto.onload = function () {
            el.authorPhoto.hidden = false;
            window.setTimeout(function () {
              el.authorPhoto.classList.add('is-loaded');
            }, 60);
          };
          el.authorPhoto.onerror = function () {
            el.authorPhoto.hidden = true;
          };
          el.authorPhoto.src = data.thumbnail.source;
        }
      })
      .catch(function () { /* fail silently */ });
  }

  // ---- crack + reveal ----
  function crackAndReveal() {
    currentIndex = pickRandom(currentIndex, activePool.length);

    el.cookieStage.classList.remove('is-cracked');
    void el.cookieStage.offsetWidth;
    el.cookieStage.classList.add('is-cracked');

    window.setTimeout(function () {
      el.cookieBtn.hidden = true;

      var quote = activePool[currentIndex];
      el.quoteText.textContent = quote.q;
      el.quoteText.className = 'reveal-quote ' + sizeTier(quote.q);
      el.quoteAuthor.textContent = '\u2014 ' + quote.a;
      el.revealEyebrow.textContent = (pathMode === 'today') ? "✦ Today's fortune" : '✦ Just for you';

      fetchAuthorInfo(quote.a);

      showPanel(el.reveal);
      focusPanel(el.reveal);
    }, 560);
  }

  el.cookieBtn.addEventListener('click', crackAndReveal);

  // ---- crack another ----
  el.againBtn.addEventListener('click', function () {
    el.authorPhoto.classList.remove('is-loaded');
    el.authorPhoto.hidden = true;
    el.authorPhoto.src = '';
    el.authorRole.textContent = '';
    el.authorRole.classList.remove('is-loaded');
    hidePanel(el.reveal);
    el.cookieStage.classList.remove('is-cracked');
    showPanel(el.cookieBtn);
    el.cookieBtn.focus({ preventScroll: true });
  });

  // ---- auto-resize: report exact banner height to parent iframe ----
  function reportHeight() {
    try {
      var banner = document.querySelector('.banner');
      if (!banner) return;
      var h = Math.ceil(banner.getBoundingClientRect().height || banner.offsetHeight);
      if (h > 0) window.parent.postMessage({ type: 'qotdHeight', height: h }, '*');
    } catch (e) {}
  }
  window.addEventListener('load', reportHeight);
  window.addEventListener('resize', reportHeight);
  reportHeight();
})();
</script>
</body>
</html>
